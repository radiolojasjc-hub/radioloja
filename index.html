<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Convite Especial - Aniversário</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
            color: white;
        }

        /* VIDEO FULLSCREEN BACKGROUND */
        .video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(3px);
            z-index: -1;
        }

        /* CONTEÚDO PRINCIPAL */
        .container {
            position: relative;
            z-index: 2;
            max-width: 650px;
            margin: 20px auto;
            padding: 20px;
        }

        /* CARD PRINCIPAL */
        .invite-card {
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 28px 24px 36px;
            border: 1px solid rgba(255, 215, 0, 0.5);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            transition: all 0.3s;
        }

        .hero {
            text-align: center;
            margin-bottom: 24px;
        }

        .avatar {
            background: linear-gradient(135deg, #ff9a3c, #d43f00);
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 18px;
            border: 3px solid #ffd966;
            font-size: 48px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.4rem;
            font-weight: 800;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #ffda99;
            letter-spacing: 2px;
        }

        /* INFO */
        .info-row {
            display: flex;
            align-items: center;
            gap: 18px;
            background: rgba(0,0,0,0.5);
            border-radius: 60px;
            padding: 12px 20px;
            margin-bottom: 16px;
            border-left: 3px solid #ff9a3c;
        }

        .info-icon {
            width: 48px;
            height: 48px;
            background: rgba(255,154,60,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: #ffcd7e;
        }

        .info-text h3 {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #ffcd7e;
            letter-spacing: 1px;
        }

        .info-text p {
            font-size: 1rem;
            font-weight: 500;
            color: white;
        }

        /* BOTÕES */
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 20px 0 15px;
        }

        .btn {
            flex: 1;
            padding: 12px 12px;
            border-radius: 60px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: #25D366;
            color: #1a2a1a;
            box-shadow: 0 4px 10px rgba(37,211,102,0.4);
        }

        .btn-primary:active { transform: scale(0.97); background: #20b859; }

        .btn-secondary {
            background: #ff7e05;
            color: white;
            box-shadow: 0 4px 10px rgba(255,126,5,0.4);
        }

        .btn-secondary:active { transform: scale(0.97); background: #e56e00; }

        .btn-outline {
            background: rgba(0,0,0,0.6);
            border: 1px solid #ffcd7e;
            color: #ffcd7e;
        }

        .btn-outline:active { transform: scale(0.97); background: rgba(0,0,0,0.8); }

        /* LISTA DE CONVIDADOS (ADMIN) */
        .guestlist-section {
            margin-top: 30px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 20px;
        }

        .guestlist-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .guestlist-header h3 {
            font-size: 1.2rem;
            color: #ffcd7e;
        }

        .guestlist-actions {
            display: flex;
            gap: 10px;
        }

        .small-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
        }

        .guest-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .guest-item {
            background: rgba(255,255,255,0.08);
            border-radius: 40px;
            padding: 10px 16px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .guest-info {
            display: flex;
            gap: 15px;
            align-items: baseline;
            flex-wrap: wrap;
        }

        .guest-name {
            font-weight: 600;
            color: #ffda99;
        }

        .guest-guests {
            font-size: 0.8rem;
            color: #ccc;
        }

        .delete-guest {
            background: none;
            border: none;
            color: #ff8888;
            cursor: pointer;
            font-size: 1rem;
            padding: 4px 8px;
        }

        .empty-message {
            text-align: center;
            color: #aaa;
            padding: 20px;
            font-style: italic;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.open {
            display: flex;
        }

        .modal-card {
            background: #1e1e2a;
            border-radius: 48px;
            padding: 32px 24px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            border: 1px solid #ff9a3c;
        }

        .modal-card h3 {
            font-size: 1.6rem;
            margin-bottom: 20px;
            color: #ffcd7e;
        }

        .modal-input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 60px;
            border: 1px solid #444;
            background: #2a2a35;
            color: white;
            font-size: 1rem;
            margin-bottom: 15px;
            outline: none;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border-radius: 60px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.7rem;
            color: #ccc;
        }

        @media (max-width: 550px) {
            .container { padding: 12px; }
            .invite-card { padding: 20px 16px; }
            h1 { font-size: 1.8rem; }
            .btn { font-size: 0.8rem; padding: 10px 8px; }
        }
    </style>
</head>
<body>
    <!-- VÍDEO FULLSCREEN (coloque seu vídeo no mesmo diretório com nome "background.mp4" ou altere o src) -->
    <video class="video-bg" autoplay loop muted playsinline poster="https://via.placeholder.com/1920x1080?text=Video+Background">
        <source src="background.mp4" type="video/mp4">
        <!-- Fallback: URL pública de vídeo de festa (apenas exemplo) -->
        <source src="https://assets.mixkit.co/videos/preview/mixkit-colorful-confetti-falling-on-a-party-32870-large.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <div class="container">
        <div class="invite-card">
            <div class="hero">
                <div class="avatar">
                    <i class="fas fa-crown"></i>
                </div>
                <h1>VOCÊ É ESPECIAL</h1>
                <div class="subtitle">✨ Aniversário ✨</div>
            </div>

            <div class="info-row">
                <div class="info-icon"><i class="fas fa-calendar-alt"></i></div>
                <div class="info-text">
                    <h3>DATA & HORA</h3>
                    <p>14 de Junho de 2026 • 20h00</p>
                </div>
            </div>

            <div class="info-row">
                <div class="info-icon"><i class="fas fa-map-marker-alt"></i></div>
                <div class="info-text">
                    <h3>LOCAL</h3>
                    <p>Espaço Bella Vista<br>Rua das Flores, 123 - Centro</p>
                </div>
            </div>

            <div class="btn-group">
                <button class="btn btn-primary" id="confirmarBtn"><i class="fab fa-whatsapp"></i> Confirmar Presença</button>
                <button class="btn btn-secondary" id="mapaBtn"><i class="fas fa-directions"></i> Como Chegar</button>
            </div>
            <div class="btn-group">
                <button class="btn btn-outline" id="sugerirPresenteBtn"><i class="fas fa-gift"></i> Sugerir Presente</button>
                <button class="btn btn-outline" id="verListaBtn"><i class="fas fa-list"></i> Ver Lista de Convidados</button>
            </div>
        </div>

        <!-- SEÇÃO DE LISTA DE CONVIDADOS (inicialmente oculta) -->
        <div id="guestlistSection" class="guestlist-section" style="display: none;">
            <div class="guestlist-header">
                <h3><i class="fas fa-users"></i> Lista de confirmados</h3>
                <div class="guestlist-actions">
                    <button class="small-btn" id="sendReportBtn"><i class="fab fa-whatsapp"></i> Enviar relatório</button>
                    <button class="small-btn" id="closeListBtn"><i class="fas fa-times"></i> Fechar</button>
                </div>
            </div>
            <div id="guestListContainer" class="guest-list">
                <div class="empty-message">Nenhum convidado confirmado ainda.</div>
            </div>
        </div>

        <footer>
            <i class="fas fa-heart" style="color:#ff7e05"></i> Sua presença é muito importante!
        </footer>
    </div>

    <!-- MODAL DE CONFIRMAÇÃO -->
    <div id="confirmModal" class="modal">
        <div class="modal-card">
            <h3>🎉 Confirmar presença</h3>
            <input type="text" id="guestName" class="modal-input" placeholder="Seu nome completo" autocomplete="off">
            <select id="acompanhantes" class="modal-input">
                <option value="0">Vou só</option>
                <option value="1">1 acompanhante</option>
                <option value="2">2 acompanhantes</option>
                <option value="3">3 acompanhantes</option>
                <option value="4+">Mais de 3</option>
            </select>
            <div class="modal-buttons">
                <button id="enviarConfirmacao">Confirmar via WhatsApp</button>
                <button id="fecharModal">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- MODAL PARA SUGERIR PRESENTE -->
    <div id="presenteModal" class="modal">
        <div class="modal-card">
            <h3>🎁 Sugerir presente</h3>
            <input type="text" id="presenteInput" class="modal-input" placeholder="Ex: Jogo de taças" autocomplete="off">
            <div class="modal-buttons">
                <button id="enviarPresenteBtn">Enviar sugestão</button>
                <button id="fecharPresenteModal">Fechar</button>
            </div>
        </div>
    </div>

    <script>
        // ---------- CONFIGURAÇÕES ----------
        const NUMERO_WHATSAPP = "5511999999999"; // SUBSTITUA PELO SEU NÚMERO (com DDD, ex: 5511987654321)
        const ENDERECO = "Espaço Bella Vista, Rua das Flores, 123 - Centro";
        const NOME_EVENTO = "Aniversariante";
        const DATA_EVENTO = "14 de Junho de 2026 às 20h";

        // ---------- GERENCIAMENTO DA LISTA DE CONVIDADOS (localStorage) ----------
        let guestList = [];

        function loadGuestList() {
            const stored = localStorage.getItem("guestList");
            if (stored) {
                guestList = JSON.parse(stored);
            } else {
                guestList = [];
            }
            renderGuestList();
        }

        function saveGuestList() {
            localStorage.setItem("guestList", JSON.stringify(guestList));
        }

        function addGuest(name, acompanhantes) {
            const newGuest = {
                id: Date.now(),
                name: name.trim(),
                acompanhantes: acompanhantes,
                date: new Date().toLocaleString()
            };
            guestList.push(newGuest);
            saveGuestList();
            renderGuestList();
            return newGuest;
        }

        function removeGuest(id) {
            guestList = guestList.filter(g => g.id !== id);
            saveGuestList();
            renderGuestList();
        }

        function renderGuestList() {
            const container = document.getElementById("guestListContainer");
            if (!container) return;
            if (guestList.length === 0) {
                container.innerHTML = '<div class="empty-message">Nenhum convidado confirmado ainda.</div>';
                return;
            }
            let html = '';
            guestList.forEach(guest => {
                let acompanhantesText = guest.acompanhantes === '0' ? 'Sem acompanhantes' : 
                                        (guest.acompanhantes === '4+' ? 'Mais de 3' : guest.acompanhantes + ' acompanhante(s)');
                html += `
                    <div class="guest-item" data-id="${guest.id}">
                        <div class="guest-info">
                            <span class="guest-name">${escapeHtml(guest.name)}</span>
                            <span class="guest-guests">👥 ${acompanhantesText}</span>
                            <span class="guest-guests" style="font-size:0.7rem;">📅 ${guest.date}</span>
                        </div>
                        <button class="delete-guest" data-id="${guest.id}"><i class="fas fa-trash-alt"></i></button>
                    </div>
                `;
            });
            container.innerHTML = html;
            // adicionar eventos de delete
            document.querySelectorAll('.delete-guest').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = parseInt(btn.getAttribute('data-id'));
                    if (confirm("Remover este convidado da lista?")) {
                        removeGuest(id);
                    }
                });
            });
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Enviar relatório da lista de convidados via WhatsApp
        function sendReportViaWhatsApp() {
            if (guestList.length === 0) {
                alert("Nenhum convidado confirmado ainda.");
                return;
            }
            let message = `📋 *RELATÓRIO DE CONFIRMADOS* - ${NOME_EVENTO}%0A%0A`;
            message += `📅 ${DATA_EVENTO}%0A📍 ${ENDERECO}%0A%0A`;
            message += `*Total de confirmações:* ${guestList.length}%0A`;
            let totalAcompanhantes = 0;
            guestList.forEach((guest, idx) => {
                let acompanhantesNum = guest.acompanhantes === '0' ? 0 : (guest.acompanhantes === '4+' ? 4 : parseInt(guest.acompanhantes));
                totalAcompanhantes += acompanhantesNum;
                message += `${idx+1}️⃣ *${guest.name}* - ${guest.acompanhantes === '0' ? 'Sozinho(a)' : guest.acompanhantes + ' acompanhante(s)'}%0A`;
            });
            message += `%0A👥 *Total de pessoas:* ${guestList.length + totalAcompanhantes} (incluindo aniversariante?)%0A`;
            message += `%0A🎉 Estamos ansiosos para celebrar!`;
            const url = `https://wa.me/${NUMERO_WHATSAPP}?text=${message}`;
            window.open(url, '_blank');
        }

        // ---------- INTERFACE ----------
        const confirmarBtn = document.getElementById('confirmarBtn');
        const mapaBtn = document.getElementById('mapaBtn');
        const sugerirPresenteBtn = document.getElementById('sugerirPresenteBtn');
        const verListaBtn = document.getElementById('verListaBtn');
        const guestlistSection = document.getElementById('guestlistSection');
        const closeListBtn = document.getElementById('closeListBtn');
        const sendReportBtn = document.getElementById('sendReportBtn');
        const confirmModal = document.getElementById('confirmModal');
        const fecharModal = document.getElementById('fecharModal');
        const enviarConfirmacao = document.getElementById('enviarConfirmacao');
        const presenteModal = document.getElementById('presenteModal');
        const fecharPresenteModal = document.getElementById('fecharPresenteModal');
        const enviarPresenteBtn = document.getElementById('enviarPresenteBtn');

        // Abrir modal de confirmação
        confirmarBtn.addEventListener('click', () => {
            confirmModal.classList.add('open');
        });

        // Fechar modais
        fecharModal.addEventListener('click', () => confirmModal.classList.remove('open'));
        fecharPresenteModal.addEventListener('click', () => presenteModal.classList.remove('open'));
        window.addEventListener('click', (e) => {
            if (e.target === confirmModal) confirmModal.classList.remove('open');
            if (e.target === presenteModal) presenteModal.classList.remove('open');
        });

        // Enviar confirmação via WhatsApp e salvar na lista
        enviarConfirmacao.addEventListener('click', () => {
            const nome = document.getElementById('guestName').value.trim();
            const acompanhantes = document.getElementById('acompanhantes').value;
            if (!nome) {
                alert("Por favor, digite seu nome.");
                return;
            }

            // Salvar na lista local
            addGuest(nome, acompanhantes);

            // Montar mensagem WhatsApp
            let msg = `🎉 *CONFIRMAÇÃO DE PRESENÇA* 🎉%0A%0A`;
            msg += `Olá *${NOME_EVENTO}*, confirmo minha presença!%0A`;
            msg += `*Nome:* ${nome}%0A`;
            msg += `*Acompanhantes:* ${acompanhantes === '0' ? 'Nenhum' : (acompanhantes === '4+' ? 'Mais de 3' : acompanhantes + ' pessoa(s)')}%0A%0A`;
            msg += `📅 ${DATA_EVENTO}%0A📍 ${ENDERECO}%0A%0A`;
            msg += `🥳 Conto com vocês!`;

            const url = `https://wa.me/${NUMERO_WHATSAPP}?text=${encodeURIComponent(msg)}`;
            window.open(url, '_blank');

            // Efeito visual
            alert(`✅ Confirmação registrada! Obrigado, ${nome}.`);
            confirmModal.classList.remove('open');
            document.getElementById('guestName').value = '';
            document.getElementById('acompanhantes').value = '0';
        });

        // Como chegar (abre Google Maps com rota)
        mapaBtn.addEventListener('click', () => {
            const mapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(ENDERECO)}`;
            window.open(mapsUrl, '_blank');
        });

        // Sugerir presente (abre modal)
        sugerirPresenteBtn.addEventListener('click', () => {
            presenteModal.classList.add('open');
        });

        enviarPresenteBtn.addEventListener('click', () => {
            const presente = document.getElementById('presenteInput').value.trim();
            if (!presente) {
                alert("Digite sua sugestão de presente.");
                return;
            }
            let msg = `🎁 *SUGESTÃO DE PRESENTE* 🎁%0A%0A`;
            msg += `Olá *${NOME_EVENTO}*, gostaria de sugerir: "%0A✨ *${presente}* ✨%0A%0AEspero que goste! 🥳`;
            const url = `https://wa.me/${NUMERO_WHATSAPP}?text=${encodeURIComponent(msg)}`;
            window.open(url, '_blank');
            presenteModal.classList.remove('open');
            document.getElementById('presenteInput').value = '';
            alert("Sugestão enviada! Obrigado.");
        });

        // Exibir/ocultar lista de convidados
        verListaBtn.addEventListener('click', () => {
            if (guestlistSection.style.display === 'none') {
                guestlistSection.style.display = 'block';
                renderGuestList();
            } else {
                guestlistSection.style.display = 'none';
            }
        });

        closeListBtn.addEventListener('click', () => {
            guestlistSection.style.display = 'none';
        });

        sendReportBtn.addEventListener('click', () => {
            sendReportViaWhatsApp();
        });

        // Carregar dados salvos
        loadGuestList();
    </script>
</body>
</html>
